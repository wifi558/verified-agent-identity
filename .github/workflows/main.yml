name: Verify Human Identity

on:
  workflow_dispatch:
    inputs:
      agent_name:
        description: "wifi558"
        required: true
        default: "wifi558"
      agent_description:
        description: "wifi558"
        required: true
        default: "wifi558 AI Agent"

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install ClawHub skill
        run: npx clawhub@latest install verified-agent-identity

      - name: Install dependencies
        run: |
          cd scripts
          npm install
      - name: Create Ethereum Identity
        run: node scripts/createNewEthereumIdentity.js

      - name: Link Human to Agent
        run: |
          CHALLENGE=$(jq -n \
            --arg name "${{ github.event.inputs.agent_name }}" \
            --arg desc "${{ github.event.inputs.agent_description }}" \
            '{name: $name, description: $desc}')
          
          node scripts/manualLinkHumanToAgent.js --challenge "$CHALLENGE"
